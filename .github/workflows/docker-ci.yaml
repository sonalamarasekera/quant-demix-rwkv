name: Docker CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-validation:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Poetry
        run: |
          python -m pip install -U pip
          pip install poetry
          poetry config virtualenvs.create false
      - name: Build Docker image
        run: |
          docker build -t rwkv-ss:ci .
      - name: Validate Docker run with dry config
        run: |
          docker run --rm rwkv-ss:ci --config configs/experiment/dry_run.yaml
